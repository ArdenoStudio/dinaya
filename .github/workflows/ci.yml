name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run verify

      - run: npm run audit:high

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Require e2e secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$AUTH_SECRET" ]; then
            echo "::error::DATABASE_URL and AUTH_SECRET repository secrets are required for e2e."
            exit 1
          fi

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Start app for e2e
        run: |
          npm run dev -- -p 3001 > /tmp/next-dev.log 2>&1 &
          echo $! > /tmp/next-dev.pid
          npx --yes wait-on@8.0.1 -t 120000 "${PLAYWRIGHT_BASE_URL}/login"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          E2E_DISABLE_RATE_LIMIT: "true"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3001

      - run: npm run test:e2e
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3001
          E2E_DISABLE_RATE_LIMIT: "true"

      - name: Stop app for e2e
        if: always()
        run: |
          if [ -f /tmp/next-dev.pid ]; then
            kill "$(cat /tmp/next-dev.pid)" 2>/dev/null || true
          fi
