name: Google Calendar sync cron

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        run: |
          curl -fsS -X GET "${{ secrets.APP_URL }}/api/cron/google-calendar-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
