name: AI workflows cron

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  invoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call AI workflows endpoint
        env:
          APP_URL: ${{ vars.DINAYA_APP_URL || secrets.DINAYA_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${APP_URL}" ]; then
            echo "::error::Set DINAYA_APP_URL as a repository variable or secret."
            exit 1
          fi

          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::Set CRON_SECRET as a repository secret."
            exit 1
          fi

          curl --fail-with-body --show-error --silent \
            --retry 2 --retry-delay 10 --max-time 300 \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/ai-workflows"
