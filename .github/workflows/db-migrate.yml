name: DB Migrate

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check migration secrets
        id: migrate_secrets
        env:
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL_DIRECT" ] || [ -n "$DATABASE_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "::warning::DATABASE_URL_DIRECT (preferred) or DATABASE_URL repository secret is required for db:migrate."
          echo "::warning::Add secrets under GitHub → Settings → Secrets and variables → Actions, then re-run this workflow."

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual workflow_dispatch requires database secrets." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        if: steps.migrate_secrets.outputs.configured == 'true'
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
        if: steps.migrate_secrets.outputs.configured == 'true'

      - name: Apply pending migrations
        if: steps.migrate_secrets.outputs.configured == 'true'
        run: npm run db:migrate
        env:
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
