<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dinaya.lk — LinkedIn Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'CalSans';
      src: url('src/fonts/CalSans-SemiBold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Banner ── */
    .banner {
      position: relative;
      width: 1128px;
      height: 191px;
      overflow: hidden;
      background-color: #1A56DB;
      background-image: radial-gradient(
        ellipse 70% 180% at 100% 50%,
        rgba(255,255,255,0.07) 0%,
        transparent 65%
      );
    }

    /* ── Glass pill — exact same recipe as UnderlayNav ── */
    .glass-logo {
      position: absolute;
      bottom: 22px;
      right: 28px;

      /* logo content layout */
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px 18px 10px 14px;
      border-radius: 0.875rem;          /* matches nav pill border-radius */

      /* glass fill — white tinted, adapted for blue bg */
      background-color: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);

      /* exact box-shadow from UnderlayNav glass span */
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.55),
        inset 1.8px 3px 0px -2px rgba(255, 255, 255, 0.90),
        inset -2px -2px 0px -2px rgba(255, 255, 255, 0.80),
        inset -3px -8px 1px -6px rgba(255, 255, 255, 0.60),
        inset -0.3px -1px 4px 0px rgba(0, 0, 0, 0.06),
        inset -1.5px 2.5px 0px -2px rgba(0, 0, 0, 0.10),
        inset 0px 3px 4px -2px rgba(0, 0, 0, 0.10),
        inset 2px -6.5px 1px -4px rgba(0, 0, 0, 0.05),
        0px 1px 5px 0px rgba(0, 0, 0, 0.08),
        0px 8px 32px 0px rgba(0, 0, 0, 0.12);
    }

    .logo-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      color: #ffffff;
    }

    /* Cal Sans, same as font-cal text-xl leading-none on the website */
    .logo-name {
      font-family: 'CalSans', sans-serif;
      font-weight: 600;
      font-size: 20px;
      line-height: 1;
      color: #ffffff;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="banner">

    <!-- Glass pill logo — same glass as the navbar -->
    <div class="glass-logo">

      <!-- Actual Dinaya SVG logo, white, currentColor -->
      <svg class="logo-icon" viewBox="318 319 875 866" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">

      </svg>

      <!-- "Dinaya.lk" in Cal Sans, exactly like the website nav -->
      <span class="logo-name">Dinaya.lk</span>

    </div>

  </div>
</body>
</html>
