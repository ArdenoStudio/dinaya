<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dinaya Desktop</title>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:grid;place-items:center;background:#eef3f8;color:#142033;font:14px 'Segoe UI',system-ui,sans-serif;">
        Loading Dinaya Desktop...
      </div>
    </div>
    <script>
      window.addEventListener("error", function (event) {
        document.body.dataset.desktopError = event.message || "error";
      });
      window.addEventListener("unhandledrejection", function (event) {
        document.body.dataset.desktopError = String(event.reason || "promise rejection");
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
